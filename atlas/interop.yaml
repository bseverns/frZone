repo_role: analysis
owned_ids:
  - interop/frzone.rig.json analysisLane.semanticBands[].semanticId
interfaces:
  ports:
    - name: frzone_osc_out
      port: 8000
      protocol: udp
      notes: Rig-tuned OSC output port from interop/frzone.rig.json.
    - name: frzone_osc_in
      port: 8001
      protocol: udp
      notes: Optional inbound parameter tweak port in rig-tuned mode.
  protocols:
    - OSC (UDP)
    - MIDI out
    - local audio input
emits:
  osc_addresses:
    - /bandEnergy
    - /bandTrigger
    - /analysis/low_band
    - /analysis/mid_band
    - /analysis/upper_mid_band
    - /analysis/high_band
    - /analysis/trigger/low_band
    - /analysis/trigger/mid_band
    - /analysis/trigger/upper_mid_band
    - /analysis/trigger/high_band
  midi_channels:
    - 15
consumes:
  osc_addresses:
    - /band/threshold
    - /band/hysteresis
    - /band/cooldown
    - /band/note
    - /band/cc
  audio_inputs:
    - post-fader analysis bus from the mixer
invariants:
  - live-rig is the semantic authority repo; this repo consumes a committed mirror of the exported runtime snapshot at atlas/live-rig.default.json.
  - frZone owns normalized band analysis only and must not become the owner of scene, state, event, or transport logic.
  - Rig-tuned output bindings live in interop/frzone.rig.json; generic classroom mappings live separately in processing/FreqZone/data/mapping.json.
  - Analysis is additive only; if frZone disappears, downstream consumers fall back to scene base plus manual macros.
